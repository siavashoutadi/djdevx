services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DEVCONTAINER: "true"
      PYTHONBREAKPOINT: "ipdb.set_trace"
    volumes:
    - ../:/home/devuser/workspace:cached
    - precommit-cache:/home/devuser/.cache/pre-commit
    networks:
    - devcontainer
    command: sleep infinity
volumes:
  precommit-cache:
    driver: local
networks:
  devcontainer:
    driver: bridge
