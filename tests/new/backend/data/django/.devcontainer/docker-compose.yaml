services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
    - ./.env/devcontainer
    volumes:
    - ../:/home/devuser/workspace:cached
    - precommit-cache:/home/devuser/.cache/pre-commit
    networks:
    - devcontainer
    command: sleep infinity
volumes:
  precommit-cache:
    driver: local
networks:
  devcontainer:
    driver: bridge
